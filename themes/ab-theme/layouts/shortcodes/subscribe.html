{{ with .Site.Params.newsletter }}
<div class="newsletter-inline my-8 p-6 rounded-lg border border-[var(--color-border)] bg-[var(--color-surface)] text-center">
  <h3 class="text-lg font-semibold mb-2">Enjoyed this post?</h3>
  <p class="text-sm text-[var(--color-text-muted)] mb-4">Subscribe to get notified when I publish something new.</p>
  <form action="{{ .action }}" method="post" class="flex gap-2 max-w-sm mx-auto">
    <input type="email" name="email" placeholder="your@email.com" required
           class="flex-1 px-4 py-2 rounded-lg border border-[var(--color-border)] bg-[var(--color-bg)] text-[var(--color-text)] text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]">
    <button type="submit"
            class="px-4 py-2 rounded-lg bg-[var(--color-accent)] text-white text-sm font-medium hover:bg-[var(--color-accent-hover)] transition-colors">
      Subscribe
    </button>
  </form>
</div>
{{ end }}
