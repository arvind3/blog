{{ define "main" }}
<div class="text-center py-16">
  <h1 class="text-6xl font-bold text-[var(--color-accent)] mb-4">404</h1>
  <p class="text-xl text-[var(--color-text-muted)] mb-8">Page not found</p>
  <p class="text-[var(--color-text-muted)] mb-8">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ .Site.BaseURL }}"
     class="inline-block px-6 py-3 rounded-lg bg-[var(--color-accent)] text-white font-medium hover:bg-[var(--color-accent-hover)] transition-colors">
    Back to Home
  </a>
</div>
{{ end }}
