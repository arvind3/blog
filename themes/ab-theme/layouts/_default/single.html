{{ define "main" }}
<article class="post">
  <header class="mb-8">
    <h1 class="text-3xl sm:text-4xl font-bold mb-4 leading-tight">{{ .Title }}</h1>
    {{- partial "post-meta.html" . -}}
  </header>

  <div class="prose prose-lg max-w-none
              prose-headings:text-[var(--color-text)] prose-headings:font-semibold
              prose-p:text-[var(--color-text)] prose-p:leading-[1.75]
              prose-a:text-[var(--color-accent)] prose-a:no-underline hover:prose-a:underline
              prose-strong:text-[var(--color-text)]
              prose-code:text-[var(--color-accent)] prose-code:bg-[var(--color-code-bg)] prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-code:text-sm
              prose-pre:bg-[var(--color-code-bg)] prose-pre:border prose-pre:border-[var(--color-border)] prose-pre:rounded-lg
              prose-blockquote:border-[var(--color-accent)] prose-blockquote:text-[var(--color-text-muted)]
              prose-img:rounded-lg prose-img:shadow-md
              prose-hr:border-[var(--color-border)]
              prose-li:text-[var(--color-text)]
              prose-table:text-[var(--color-text)]
              prose-th:text-[var(--color-text)] prose-th:border-[var(--color-border)]
              prose-td:border-[var(--color-border)]">
    {{ .Content }}
  </div>

  <!-- Tags -->
  {{ with .Params.tags }}
  <div class="flex flex-wrap gap-2 mt-10 pt-6 border-t border-[var(--color-border)]">
    {{ range . }}
    <a href="{{ "tags/" | absURL }}{{ . | urlize }}/"
       class="text-sm font-medium px-3 py-1 rounded-full bg-[var(--color-tag-bg)] text-[var(--color-tag-text)] hover:opacity-80 transition-opacity">
      #{{ . }}
    </a>
    {{ end }}
  </div>
  {{ end }}
</article>
{{ end }}
