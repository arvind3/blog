<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" data-theme="light">
<head>
  {{- partial "head.html" . -}}
</head>
<body class="bg-[var(--color-bg)] text-[var(--color-text)] transition-colors duration-300 min-h-screen flex flex-col">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-[9999] focus:bg-[var(--color-accent)] focus:text-white focus:px-4 focus:py-2 focus:rounded">Skip to content</a>
  {{- partial "header.html" . -}}
  <main id="main-content" class="flex-1 w-full max-w-3xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
    {{- block "main" . }}{{ end -}}
  </main>
  {{- partial "footer.html" . -}}
  <script src="{{ "js/main.js" | absURL }}"></script>
</body>
</html>
