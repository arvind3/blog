<header class="header-shell sticky top-0 z-50 border-b border-[var(--color-border)] backdrop-blur-md transition-colors duration-300">
  <nav class="max-w-5xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between" aria-label="Main navigation">
    <a href="{{ .Site.BaseURL }}" class="tracking-tight text-base sm:text-lg font-semibold text-[var(--color-text)] hover:text-[var(--color-accent)] transition-colors">
      {{ .Site.Title }}
    </a>

    <div class="desktop-nav">
      {{ range .Site.Menus.main }}
      {{ $active := or ($.IsMenuCurrent "main" .) (eq $.RelPermalink .URL) }}
      <a href="{{ .URL }}"
         class="nav-link{{ if $active }} is-active{{ end }}"
         {{ if strings.HasPrefix .URL "http" }}target="_blank" rel="noopener noreferrer"{{ end }}>
        {{ .Name }}
      </a>
      {{ end }}

      <button id="theme-toggle" type="button"
              class="theme-toggle-icon p-2 rounded-full border border-[var(--color-border)] text-[var(--color-text-muted)] hover:text-[var(--color-accent)] hover:bg-[var(--color-surface)] transition-colors"
              aria-label="Toggle dark mode">
        <svg class="hidden dark-icon w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg class="hidden light-icon w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
    </div>

    <div class="mobile-controls">
      <button id="theme-toggle-mobile" type="button"
              class="theme-toggle-icon p-2 rounded-full border border-[var(--color-border)] text-[var(--color-text-muted)] hover:text-[var(--color-accent)] transition-colors"
              aria-label="Toggle dark mode">
        <svg class="hidden dark-icon w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg class="hidden light-icon w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
      <button id="mobile-menu-toggle" type="button"
              class="p-2 rounded-full border border-[var(--color-border)] text-[var(--color-text-muted)] hover:text-[var(--color-accent)] transition-colors"
              aria-label="Toggle menu"
              aria-expanded="false">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path class="menu-open-icon" stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          <path class="menu-close-icon hidden" stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </nav>

  <div id="mobile-menu" class="mobile-menu-panel">
    <div class="space-y-2">
      {{ range .Site.Menus.main }}
      {{ $active := or ($.IsMenuCurrent "main" .) (eq $.RelPermalink .URL) }}
      <a href="{{ .URL }}"
         class="{{ if $active }}is-active{{ end }}">
        {{ .Name }}
      </a>
      {{ end }}
    </div>
  </div>
</header>
