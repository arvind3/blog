{{ $related := .Site.RegularPages.Related . | first 3 }}
{{ with $related }}
<section class="related-posts mt-12 pt-8 border-t border-[var(--color-border)]">
  <h2 class="text-xl font-semibold mb-6">Related Posts</h2>
  <div class="grid gap-4 sm:grid-cols-3">
    {{ range . }}
    <a href="{{ .Permalink }}" class="block p-4 rounded-lg border border-[var(--color-border)] bg-[var(--color-surface)] hover:border-[var(--color-accent)] transition-colors">
      <h3 class="text-sm font-semibold text-[var(--color-text)] mb-1 line-clamp-2">{{ .Title }}</h3>
      <p class="text-xs text-[var(--color-text-muted)]">{{ .ReadingTime }} min read</p>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
